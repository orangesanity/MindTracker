<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MindTracker">
<title>Areewood MindTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090e;
    --surface: #10121a;
    --surface2: #181c28;
    --surface3: #1f2536;
    --border: #282f42;
    --text: #e8ecf4;
    --text-dim: #8a96b0;
    --text-muted: #4e5a74;
    --accent: #6ee7b7;
    --accent2: #fbbf24;
    --eddie: #00d4ff;
    --esther: #d4a0ff;
    --ryan: #34d399;
    --amy: #fb7185;
    --green: #00e676;
    --gold: #ffd740;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 10%, rgba(110,231,183,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 70% 90%, rgba(251,191,36,0.04) 0%, transparent 50%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(0,212,255,0.03) 0%, transparent 50%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(212,160,255,0.03) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0 24px;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
  .header-logo { font-size: 48px; margin-bottom: 8px; }
  .header h1 {
    font-size: 32px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub {
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 3px; margin-top: 6px;
  }

  .sync-bar {
    text-align: center; margin-bottom: 24px;
  }
  .sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .sync-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sync-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.off { background: #ff5252; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .sync-label { font-size: 10px; color: var(--text-muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; vertical-align: middle; }

  /* Areewood Game Board */
  .battle-section {
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease 0.15s both;
  }
  .battle-title {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); margin-bottom: 16px;
  }

  .leaderboard {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .lb-row {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); transition: background 0.15s;
    position: relative;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank {
    font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700;
    width: 32px; text-align: center; flex-shrink: 0;
  }
  .lb-rank.gold { color: #ffd740; }
  .lb-rank.silver { color: #b0bec5; }
  .lb-rank.bronze { color: #ff8a65; }
  .lb-avatar { font-size: 28px; flex-shrink: 0; }
  .lb-info { flex: 1; min-width: 0; }
  .lb-name { font-size: 15px; font-weight: 700; }
  .lb-stats { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .lb-streak {
    text-align: right; flex-shrink: 0;
  }
  .lb-streak-val { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; }
  .lb-streak-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

  /* Week heatmap in leaderboard row */
  .lb-week {
    display: flex; gap: 3px; margin-top: 5px;
  }
  .lb-week-dot {
    width: 14px; height: 14px; border-radius: 3px;
    background: var(--surface3);
  }
  .lb-week-dot.done { background: var(--green); box-shadow: 0 0 4px rgba(0,230,118,0.3); }
  .lb-week-dot.partial { background: var(--gold); }
  .lb-week-dot.today { border: 1.5px solid var(--text-dim); }

  /* Member Cards */
  .members-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); text-align: center; margin-bottom: 16px;
  }
  .members-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease 0.3s both;
  }
  .member-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px 16px; text-align: center;
    cursor: pointer; transition: all 0.25s;
    position: relative; overflow: hidden;
    text-decoration: none; color: inherit;
    display: block;
  }
  .member-card:active { transform: scale(0.97); }
  .member-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .member-card.eddie::before { background: linear-gradient(90deg, var(--eddie), transparent); }
  .member-card.esther::before { background: linear-gradient(90deg, var(--esther), transparent); }
  .member-card.ryan::before { background: linear-gradient(90deg, var(--ryan), transparent); }
  .member-card.amy::before { background: linear-gradient(90deg, var(--amy), transparent); }

  .member-card::after {
    content: ''; position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.25s;
  }
  .member-card.eddie::after { background: radial-gradient(circle at 50% 30%, rgba(0,212,255,0.06), transparent 70%); }
  .member-card.esther::after { background: radial-gradient(circle at 50% 30%, rgba(212,160,255,0.06), transparent 70%); }
  .member-card:active::after { opacity: 1; }

  .member-emoji { font-size: 40px; margin-bottom: 8px; position: relative; z-index: 1; }
  .member-name { font-size: 16px; font-weight: 700; position: relative; z-index: 1; }
  .member-name.eddie { color: var(--eddie); }
  .member-name.esther { color: var(--esther); }
  .member-name.ryan { color: var(--ryan); }
  .member-name.amy { color: var(--amy); }
  .member-role { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; position: relative; z-index: 1; }
  .member-status { font-size: 11px; margin-top: 10px; position: relative; z-index: 1; }
  .member-status .done { color: var(--green); font-weight: 600; }
  .member-status .pending { color: var(--text-muted); }

  .member-card.coming-soon {
    opacity: 0.35; cursor: default;
  }
  .member-card.coming-soon .member-badge {
    font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
    margin-top: 8px; position: relative; z-index: 1;
  }

  /* Footer */
  .footer {
    text-align: center; margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);
    animation: fadeUp 0.6s ease 0.45s both;
  }
  .footer-text { font-size: 11px; color: var(--text-muted); }
  .footer-text span { color: var(--accent); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-logo">🏠</div>
    <h1>AREEWOOD</h1>
    <div class="header-sub">MindTracker</div>
  </div>

  <div class="sync-bar">
    <span class="sync-dot loading" id="syncDot"></span>
    <span class="sync-label" id="syncLabel">Connecting...</span>
  </div>

  <!-- Leaderboard / Areewood Game Board -->
  <div class="battle-section">
    <div class="battle-title"><span>⚔️</span> Areewood Game Board <span>⚔️</span></div>
    <div class="leaderboard" id="leaderboard">
      <div class="lb-row" style="justify-content:center;color:var(--text-muted);font-size:13px;padding:24px;">Loading family data...</div>
    </div>
  </div>

  <!-- Member Cards -->
  <div class="members-title">Choose Your Tracker</div>
  <div class="members-grid">
    <a class="member-card eddie" href="eddie.html">
      <div class="member-emoji">🏒</div>
      <div class="member-name eddie">Eddie</div>
      <div class="member-role">Dryland Training</div>
      <div class="member-status" id="eddieStatus"><span class="pending">—</span></div>
    </a>
    <a class="member-card esther" href="esther.html">
      <div class="member-emoji">🐉</div>
      <div class="member-name esther">Esther</div>
      <div class="member-role">Dryland Training</div>
      <div class="member-status" id="estherStatus"><span class="pending">—</span></div>
    </a>
    <a class="member-card ryan coming-soon" href="javascript:void(0)">
      <div class="member-emoji">💪</div>
      <div class="member-name ryan">Ryan</div>
      <div class="member-role">Coming Soon</div>
      <div class="member-badge">Coming Soon</div>
    </a>
    <a class="member-card amy coming-soon" href="javascript:void(0)">
      <div class="member-emoji">✨</div>
      <div class="member-name amy">Amy</div>
      <div class="member-role">Coming Soon</div>
      <div class="member-badge">Coming Soon</div>
    </a>
  </div>

  <div class="footer">
    <div class="footer-text">Built with <span>♥</span> for Areewood</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

var firebaseConfig = {
  apiKey: "AIzaSyC38dXC4NHQZb1S89wLrg30WpS6dhh6RbY",
  authDomain: "mindtracker-cc06a.firebaseapp.com",
  projectId: "mindtracker-cc06a",
  storageBucket: "mindtracker-cc06a.firebasestorage.app",
  messagingSenderId: "972864435935",
  appId: "1:972864435935:web:b93fa8440b1de5d8079b6a"
};

var app = initializeApp(firebaseConfig);
var db = getFirestore(app);

var MEMBERS = [
  { id: 'eddie', name: 'Eddie', emoji: '🏒', color: 'var(--eddie)' },
  { id: 'esther', name: 'Esther', emoji: '🐉', color: 'var(--esther)' }
];

var memberData = {};
var listenersStarted = false;

function todayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function calcStreak(d) {
  if (!d || !d.days) return 0;
  var streak = 0, dt = new Date(), tk = todayKey();
  var td = d.days[tk];
  if (!td || !td.completed) dt.setDate(dt.getDate() - 1);
  while (true) {
    var k = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    if (d.days[k] && d.days[k].completed) { streak++; dt.setDate(dt.getDate() - 1); } else break;
  }
  return streak;
}

function getTotalDays(d) {
  if (!d || !d.days) return 0;
  return Object.keys(d.days).filter(function(k) { return d.days[k].completed; }).length;
}

function getWeekData(d) {
  var now = new Date(), dow = now.getDay(), result = [];
  for (var i = 0; i < 7; i++) {
    var dt = new Date(now); dt.setDate(now.getDate() - dow + i);
    var k = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
    var isToday = (dt.toDateString() === now.toDateString());
    var status = 'empty';
    if (d && d.days && d.days[k]) {
      if (d.days[k].completed) status = 'done';
      else if (d.days[k].checked && d.days[k].checked.length > 0) status = 'partial';
    }
    result.push({ status: status, today: isToday });
  }
  return result;
}

function getWeekCompleted(d) {
  return getWeekData(d).filter(function(x) { return x.status === 'done'; }).length;
}

function renderLeaderboard() {
  var entries = [];
  MEMBERS.forEach(function(m) {
    var d = memberData[m.id];
    entries.push({
      id: m.id,
      name: m.name,
      emoji: m.emoji,
      color: m.color,
      streak: calcStreak(d),
      total: getTotalDays(d),
      weekCompleted: getWeekCompleted(d),
      weekData: getWeekData(d),
      todayDone: d && d.days && d.days[todayKey()] && d.days[todayKey()].completed
    });
  });

  // Sort by streak desc, then total desc
  entries.sort(function(a, b) { return b.streak - a.streak || b.total - a.total; });

  var rankColors = ['gold', 'silver', 'bronze'];
  var rankEmojis = ['🥇', '🥈', '🥉'];
  var html = '';

  entries.forEach(function(e, i) {
    var days = ['S','M','T','W','T','F','S'];
    var weekHtml = '';
    e.weekData.forEach(function(w, di) {
      var cls = 'lb-week-dot';
      if (w.status === 'done') cls += ' done';
      else if (w.status === 'partial') cls += ' partial';
      if (w.today) cls += ' today';
      weekHtml += '<div class="' + cls + '" title="' + days[di] + '"></div>';
    });

    html += '<div class="lb-row">' +
      '<div class="lb-rank ' + (rankColors[i] || '') + '">' + (i + 1) + '</div>' +
      '<div class="lb-avatar">' + e.emoji + '</div>' +
      '<div class="lb-info">' +
        '<div class="lb-name" style="color:' + e.color + '">' + e.name + '</div>' +
        '<div class="lb-stats">' + e.total + ' total days  ·  ' + e.weekCompleted + '/7 this week</div>' +
        '<div class="lb-week">' + weekHtml + '</div>' +
      '</div>' +
      '<div class="lb-streak">' +
        '<div class="lb-streak-val" style="color:' + e.color + '">' + e.streak + '</div>' +
        '<div class="lb-streak-label">streak</div>' +
      '</div>' +
    '</div>';
  });

  document.getElementById('leaderboard').innerHTML = html;

  // Update member card statuses
  entries.forEach(function(e) {
    var statusEl = document.getElementById(e.id + 'Status');
    if (statusEl) {
      if (e.todayDone) {
        statusEl.innerHTML = '<span class="done">✓ Done today</span>';
      } else {
        statusEl.innerHTML = '<span class="pending">Not yet today</span>';
      }
    }
  });
}

function setSyncStatus(state) {
  var dot = document.getElementById('syncDot');
  var label = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  label.textContent = state === 'ok' ? 'Live' : state === 'loading' ? 'Connecting...' : 'Offline';
}

function startListening() {
  if (listenersStarted) return;
  listenersStarted = true;

  var connectedCount = 0;

  MEMBERS.forEach(function(m) {
    try {
      onSnapshot(doc(db, 'trackers', m.id), function(snap) {
        if (snap.exists()) {
          try {
            memberData[m.id] = JSON.parse(snap.data().data);
          } catch(e) {}
        }
        connectedCount++;
        if (connectedCount >= MEMBERS.length) setSyncStatus('ok');
        renderLeaderboard();
      }, function(err) {
        console.error('Listen error for ' + m.id + ':', err);
        setSyncStatus('off');
      });
    } catch(e) {
      console.error('Failed to listen to ' + m.id, e);
      setSyncStatus('off');
    }
  });
}

// Init
renderLeaderboard();
startListening();
</script>
</body>
</html>
